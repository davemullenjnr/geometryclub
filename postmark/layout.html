<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    <title>Geometry Club</title>
    <style type="text/css" rel="stylesheet" media="all">
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");
      body {
        width: 100% !important;
        height: 100%;
        margin: 0;
        -webkit-text-size-adjust: none;
        background-color: #111111;
      }
      a {
        color: #f1f1f1;
      }
      a img {
        border: none;
      }
      td {
        word-break: break-word;
      }
      .preheader {
        display: none !important;
        visibility: hidden;
        mso-hide: all;
        font-size: 1px;
        line-height: 1px;
        max-height: 0;
        max-width: 0;
        opacity: 0;
        overflow: hidden;
      }
      body,
      td,
      th {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }
      h1 {
        margin-top: 0;
        color: #f1f1f1;
        font-size: 24px;
        font-weight: bold;
        text-align: left;
      }
      h2 {
        margin-top: 0;
        color: #f1f1f1;
        font-size: 22px;
        font-weight: bold;
        text-align: left;
      }
      h3 {
        margin-top: 0;
        color: #f1f1f1;
        font-size: 14px;
        font-weight: bold;
        text-align: left;
      }
      td,
      th {
        font-size: 13px;
        line-height: 1.6;
      }
      p,
      ul,
      ol,
      blockquote {
        margin: 0.4em 0 1.1875em;
        font-size: 13px;
        line-height: 1.6;
      }
      p.sub {
        font-size: 12px;
      }
      .align-right {
        text-align: right;
      }
      .align-left {
        text-align: left;
      }
      .align-center {
        text-align: center;
      }
      .button {
        background-color: #3869d4;
        border-top: 10px solid #3869d4;
        border-right: 18px solid #3869d4;
        border-bottom: 10px solid #3869d4;
        border-left: 18px solid #3869d4;
        display: inline-block;
        color: #fff;
        text-decoration: none;
        border-radius: 3px;
        box-shadow: 0 2px 3px rgba(41, 39, 39, 0.16);
        -webkit-text-size-adjust: none;
        box-sizing: border-box;
      }
      .button--green {
        background-color: #22bc66;
        border-top: 10px solid #22bc66;
        border-right: 18px solid #22bc66;
        border-bottom: 10px solid #22bc66;
        border-left: 18px solid #22bc66;
      }
      .button--red {
        background-color: #ff6136;
        border-top: 10px solid #ff6136;
        border-right: 18px solid #ff6136;
        border-bottom: 10px solid #ff6136;
        border-left: 18px solid #ff6136;
      }
      @media only screen and (max-width: 500px) {
        .button {
          width: 100% !important;
          text-align: center !important;
        }
      }
      .attributes {
        margin: 0 0 21px;
      }
      .attributes_content {
        background-color: #1a1a1a;
        padding: 16px;
      }
      .attributes_item {
        padding: 0;
      }
      .related {
        width: 100%;
        margin: 0;
        padding: 25px 0 0 0;
      }
      .related_item {
        padding: 10px 0;
        color: #cbcccf;
        font-size: 12px;
        line-height: 18px;
      }
      .related_item-title {
        display: block;
        margin: 0.5em 0 0;
      }
      .related_item-thumb {
        display: block;
        padding-bottom: 10px;
      }
      .related_heading {
        border-top: 1px solid #cbcccf;
        text-align: center;
        padding: 25px 0 10px;
      }
      .discount {
        width: 100%;
        margin: 0;
        padding: 24px;
        background-color: #1a1a1a;
        border: 2px dashed #cbcccf;
      }
      .discount_heading {
        text-align: center;
      }
      .discount_body {
        text-align: center;
        font-size: 12px;
      }
      .social {
        width: auto;
      }
      .social td {
        padding: 0;
        width: auto;
      }
      .social_icon {
        height: 20px;
        margin: 0 8px 10px 8px;
        padding: 0;
      }
      .purchase {
        width: 100%;
        margin: 0;
        padding: 35px 0;
      }
      .purchase_content {
        width: 100%;
        margin: 0;
        padding: 25px 0 0 0;
      }
      .purchase_item {
        padding: 10px 0;
        color: #51545e;
        font-size: 12px;
        line-height: 18px;
      }
      .purchase_heading {
        padding-bottom: 8px;
        border-bottom: 1px solid #eaeaec;
      }
      .purchase_heading p {
        margin: 0;
        color: #85878e;
        font-size: 12px;
      }
      .purchase_footer {
        padding-top: 15px;
        border-top: 1px solid #eaeaec;
      }
      .purchase_total {
        margin: 0;
        text-align: right;
        font-weight: bold;
        color: #f1f1f1;
      }
      .purchase_total--label {
        padding: 0 15px 0 0;
      }
      body {
        background-color: #111111;
        color: #f1f1f1;
      }
      p {
        color: #f1f1f1;
      }
      .email-wrapper {
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: #111111;
      }
      .email-content {
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: #111111;
      }
      .email-masthead {
        padding: 25px 0;
        text-align: left;
        line-height: 0;
      }
      .email-masthead_inner {
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
      }
      .email-masthead_logo {
        width: 120px;
        max-width: 100%;
        height: auto;
      }
      .email-masthead_logo-dark {
        display: none;
        width: 120px;
        max-width: 100%;
        height: auto;
      }
      .email-masthead_icon {
        width: 32px;
        height: 32px;
        display: inline-block;
      }
      .email-masthead_name {
        font-size: 18px;
        font-weight: bold;
        color: #a8aaaf;
        text-decoration: none;
        text-shadow: 0 1px 0 white;
      }
      .email-body {
        width: 100%;
        margin: 0;
        padding: 0;
      }
      .email-body_inner {
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
        padding: 0;
        border-radius: 4px;
      }
      .email-footer {
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
        padding: 0;
        text-align: center;
        border-radius: 2px;
      }
      .email-footer p {
        color: #aaaaaa;
      }
      .body-action {
        width: 100%;
        margin: 30px auto;
        padding: 0;
        text-align: center;
      }
      .body-sub {
        margin-top: 25px;
        padding-top: 25px;
        border-top: 1px solid #eaeaec;
      }
      .content-cell {
        padding: 32px 16px;
        border: 1px #2a2a2a solid;
        background-color: #141414;
        border-radius: 4px;
      }
      @media only screen and (max-width: 600px) {
        .email-body_inner,
        .email-footer {
          width: 100% !important;
        }
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #111111 !important;
          color: #fff !important;
        }
        p,
        ul,
        ol,
        blockquote,
        h1,
        h2,
        h3,
        span,
        .purchase_item {
          color: #fff !important;
        }
        .attributes_content,
        .discount {
          background-color: #141414 !important;
        }
        .email-masthead_name {
          text-shadow: none !important;
        }
        .email-masthead_logo {
          display: none !important;
        }
        .email-masthead_logo-dark {
          display: inline-block !important;
        }
      }
      :root {
        color-scheme: light dark;
        supported-color-schemes: light dark;
      }
    </style>

</html>
